name: CI/CD - Build & Deploy to Swarm

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  ORG: career-hy

  BACKEND_IMAGE: ghcr.io/career-hy/backend
  LLM_IMAGE: ghcr.io/career-hy/llm-service
  INGEST_IMAGE: ghcr.io/career-hy/ingestion

  BACKEND_SERVICE: rag_backend
  LLM_SERVICE: rag_llm-service
  INGEST_SERVICE: rag_ingestion

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/career-hy/backend

          - name: llm-service
            context: ./llm-service
            dockerfile: ./llm-service/Dockerfile
            image: ghcr.io/career-hy/llm-service

          - name: ingestion
            context: ./ingestion
            dockerfile: ./ingestion/Dockerfile
            image: ghcr.io/career-hy/ingestion

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR 로그인 (PAT 사용)
      - name: Login to GHCR (PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      # 공통 빌드 & 푸시
      - name: Build & Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:dev
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Swarm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Prep SSH key & known_hosts
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ci_key
          chmod 600 ~/.ssh/ci_key

          # ssh-keyscan은 가끔 exit 1로 끝나도 실제 배포엔 지장 없음.
          # 실패해도 워크플로 죽지 않도록 || true 붙임.
          ssh-keyscan -H "${{ secrets.EC2_HOST_A }}" >> ~/.ssh/known_hosts || true
          ssh-keyscan -H "${{ secrets.EC2_HOST_B }}" >> ~/.ssh/known_hosts || true

      # 각 노드(매니저/워커)에서 도커 정리: 디스크 부족으로 인한 업데이트 실패 방지
      - name: Cleanup Docker on manager (HOST_A)
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ci_key ${USER}@${HOST} "\
            docker system prune -af --volumes || true && \
            df -h && docker system df -v \
          "

      - name: Cleanup Docker on worker (HOST_B)
        env:
          HOST: ${{ secrets.EC2_HOST_B }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ci_key ${USER}@${HOST} "\
            docker system prune -af --volumes || true && \
            df -h && docker system df -v \
          "

      # 매니저 노드(A)에 GHCR 로그인 (스웜 전체가 여기서 pull 명령을 내리기 때문에)
      - name: Remote GHCR login on manager
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ci_key ${USER}@${HOST} "\
            echo '${GHCR_PAT}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin || true \
          "

      # rollout backend
      - name: Deploy Backend
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ci_key ${USER}@${HOST} "\
            docker service update \
              --with-registry-auth \
              --image $BACKEND_IMAGE:dev \
              --update-order stop-first \
              $BACKEND_SERVICE \
            || \
            docker service create \
              --name $BACKEND_SERVICE \
              --with-registry-auth \
              --publish 5001:5001 \
              --replicas 2 \
              $BACKEND_IMAGE:dev \
          "

      # rollout llm-service
      - name: Deploy LLM-Service
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ci_key ${USER}@${HOST} "\
            docker service update \
              --with-registry-auth \
              --image $LLM_IMAGE:dev \
              --update-order stop-first \
              $LLM_SERVICE \
            || \
            docker service create \
              --name $LLM_SERVICE \
              --with-registry-auth \
              --publish 5003:5003 \
              --replicas 2 \
              $LLM_IMAGE:dev \
          "

      # rollout ingestion (replicas=1, worker 노드에서만 돌려야 해서 기존 상태 유지)
      - name: Deploy Ingestion
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ci_key ${USER}@${HOST} "\
            docker service update \
              --with-registry-auth \
              --image $INGEST_IMAGE:dev \
              --update-order stop-first \
              $INGEST_SERVICE \
            || \
            docker service create \
              --name $INGEST_SERVICE \
              --with-registry-auth \
              --replicas 1 \
              $INGEST_IMAGE:dev \
          "

      # 상태 체크
      - name: Check Swarm status
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ci_key ${USER}@${HOST} "\
            echo '=== service ls ===' && \
            docker service ls && echo && \
            echo '=== node ls ===' && \
            docker node ls && echo && \
            echo '=== rag_backend ps ===' && \
            docker service ps $BACKEND_SERVICE --no-trunc && echo && \
            echo '=== rag_ingestion ps ===' && \
            docker service ps $INGEST_SERVICE --no-trunc && echo && \
            echo '=== rag_llm-service ps ===' && \
            docker service ps $LLM_SERVICE --no-trunc \
          "
