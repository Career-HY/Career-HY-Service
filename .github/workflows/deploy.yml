name: CI/CD - Build & Deploy to Swarm

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  ORG: career-hy

  BACKEND_IMAGE: ghcr.io/career-hy/backend
  LLM_IMAGE: ghcr.io/career-hy/llm-service
  INGEST_IMAGE: ghcr.io/career-hy/ingestion
  # CRAWLER_IMAGE: ghcr.io/career-hy/crawler   # <- 지금은 안 씀

  BACKEND_SERVICE: rag_backend
  LLM_SERVICE: rag_llm-service
  INGEST_SERVICE: rag_ingestion
  # rag_crawler는 스웜 외부에서 돌리므로 자동 배포 안 함

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/career-hy/backend

          - name: llm-service
            context: ./llm-service
            dockerfile: ./llm-service/Dockerfile
            image: ghcr.io/career-hy/llm-service

          - name: ingestion
            context: ./ingestion
            dockerfile: ./ingestion/Dockerfile
            image: ghcr.io/career-hy/ingestion

        # ❌ crawler 삭제했음
        # - name: crawler
        #   context: ./crawler
        #   dockerfile: ./crawler/Dockerfile
        #   image: ghcr.io/career-hy/crawler

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR 로그인 (PAT 사용)
      - name: Login to GHCR (PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      # 서비스 공통 빌드 & 푸시
      # dev 태그와 커밋SHA 태그 두 개를 푸시
      - name: Build & Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:dev
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Swarm
    runs-on: ubuntu-latest
    needs: build

    steps:
      #######################################################
      # SSH 준비 (키 저장)
      #######################################################
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ci_key
          chmod 600 ~/.ssh/ci_key

      #######################################################
      # 매니저 노드(A) 디스크 정리
      # - 컨테이너/이미지만 정리 (볼륨은 놔둠: chroma_data 지켜야 함)
      #######################################################
      - name: Cleanup Docker on manager (HOST_A)
        env:
          HOST_A: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/ci_key ${USER}@${HOST_A} "\
              docker container prune -f && \
              docker image prune -a -f || true && \
              df -h && docker system df -v \
            "

      #######################################################
      # 워커 노드(B) 디스크 정리
      # - GitHub Actions은 step-level if에서 secrets.*를 못 씀
      #   => 쉘 안에서 직접 조건으로 분기
      #######################################################
      - name: Cleanup Docker on worker (HOST_B)
        env:
          HOST_B: ${{ secrets.EC2_HOST_B }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          if [ -n "$HOST_B" ]; then
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ci_key ${USER}@${HOST_B} "\
                docker container prune -f && \
                docker image prune -a -f || true && \
                df -h && docker system df -v \
              "
          else
            echo "[skip] HOST_B not set, skipping worker cleanup"
          fi

      #######################################################
      # GHCR 로그인 - 매니저 노드
      #######################################################
      - name: Remote GHCR login (manager)
        env:
          HOST_A: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/ci_key ${USER}@${HOST_A} "\
              echo '${GHCR_PAT}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin || true \
            "

      #######################################################
      # GHCR 로그인 - 워커 노드 (있으면)
      #######################################################
      - name: Remote GHCR login (worker)
        env:
          HOST_B: ${{ secrets.EC2_HOST_B }}
          USER: ${{ secrets.EC2_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          if [ -n "$HOST_B" ]; then
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/ci_key ${USER}@${HOST_B} "\
                echo '${GHCR_PAT}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin || true \
              "
          else
            echo "[skip] HOST_B not set, skipping worker GHCR login"
          fi

      #######################################################
      # backend 롤링 업데이트
      # - replicas=2 (manager 1개 + worker 1개)
      # - 만약 서비스 없으면 create로 새로 만들고 publish 5001 붙임
      #######################################################
      - name: Deploy Backend
        env:
          HOST_A: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/ci_key ${USER}@${HOST_A} "\
              docker service update \
                --with-registry-auth \
                --image $BACKEND_IMAGE:dev \
                --update-order stop-first \
                $BACKEND_SERVICE \
              || \
              docker service create \
                --name $BACKEND_SERVICE \
                --with-registry-auth \
                --publish 5001:5001 \
                --replicas 2 \
                $BACKEND_IMAGE:dev \
            "

      #######################################################
      # llm-service 롤링 업데이트
      # - replicas=2 (manager 1개 + worker 1개)
      # - 없으면 새로 만들고 publish 5003 붙임
      #######################################################
      - name: Deploy LLM-Service
        env:
          HOST_A: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/ci_key ${USER}@${HOST_A} "\
              docker service update \
                --with-registry-auth \
                --image $LLM_IMAGE:dev \
                --update-order stop-first \
                $LLM_SERVICE \
              || \
              docker service create \
                --name $LLM_SERVICE \
                --with-registry-auth \
                --publish 5003:5003 \
                --replicas 2 \
                $LLM_IMAGE:dev \
            "

      #######################################################
      # ingestion 자동 배포는 안 건드림
      # 이유:
      #   - ingestion은 디스크 빡빡하고 볼륨(chroma_data) 민감함
      #   - 실패하면 전체 파이프라인이 빨간불 나니까 지금은 수동만
      #
      # ingestion 새 이미지로 굴리고 싶을 땐 (매니저 노드에서 수동):
      #   docker service update \
      #     --with-registry-auth \
      #     --constraint-add 'node.hostname==ip-172-31-46-130' \
      #     --force \
      #     rag_ingestion
      #######################################################

      #######################################################
      # 상태 점검
      #######################################################
      - name: Check Swarm status
        env:
          HOST_A: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/ci_key ${USER}@${HOST_A} "\
              echo '=== service ls ===' && \
              docker service ls && echo && \
              echo '=== node ls ===' && \
              docker node ls && echo && \
              echo '=== rag_backend ps ===' && \
              docker service ps $BACKEND_SERVICE --no-trunc && echo && \
              echo '=== rag_llm-service ps ===' && \
              docker service ps $LLM_SERVICE --no-trunc && echo && \
              echo '=== rag_ingestion ps (manual deploy) ===' && \
              docker service ps $INGEST_SERVICE --no-trunc \
            "
