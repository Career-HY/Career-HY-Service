name: CI/CD - Build & Deploy to Swarm

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  ORG: career-hy

  BACKEND_IMAGE: ghcr.io/career-hy/backend
  LLM_IMAGE: ghcr.io/career-hy/llm-service
  INGEST_IMAGE: ghcr.io/career-hy/ingestion
  CRAWLER_IMAGE: ghcr.io/career-hy/crawler

  BACKEND_SERVICE: rag_backend
  LLM_SERVICE: rag_llm-service
  INGEST_SERVICE: rag_ingestion
  # CRAWLER_SERVICE: rag_crawler   # 아직 자동 배포 안 넣었지만 나중에 쓸 이름 후보

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/career-hy/backend

          - name: llm-service
            context: ./llm-service
            dockerfile: ./llm-service/Dockerfile
            image: ghcr.io/career-hy/llm-service

          - name: ingestion
            context: ./ingestion
            dockerfile: ./ingestion/Dockerfile
            image: ghcr.io/career-hy/ingestion

          - name: crawler
            context: ./crawler
            dockerfile: ./crawler/Dockerfile
            image: ghcr.io/career-hy/crawler

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR 로그인 (PAT 사용)
      # -> 여기서 PAT는 org 패키지 푸시 권한이 있는 토큰
      - name: Login to GHCR (PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      # 공통 빌드 & 푸시
      # 여기서는 어떤 서비스든 동일하게:
      #   - Dockerfile로 이미지 빌드
      #   - :dev 와 :<커밋SHA> 태그로 GHCR에 push
      #   - 절대 OPENAI_API_KEY 같은 민감값 주입 안 함
      - name: Build & Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:dev
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Swarm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Write SSH key & known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ci_key
          chmod 600 ~/.ssh/ci_key
          ssh-keyscan -H "${{ secrets.EC2_HOST_A }}" >> ~/.ssh/known_hosts

      # (중요) 프라이빗 GHCR이면 원격 서버도 GHCR 로그인 필요
      # 매니저 노드(A)에서 docker service update할 때 이미지 pull 가능하도록 로그인
      - name: Remote GHCR login
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} \
            "echo '${GHCR_PAT}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin || true"

      # backend 서비스 롤링 업데이트
      - name: Deploy Backend
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} \
            "docker service update \
               --with-registry-auth \
               --image $BACKEND_IMAGE:dev \
               --update-order stop-first \
               $BACKEND_SERVICE \
             || \
             docker service create \
               --name $BACKEND_SERVICE \
               --with-registry-auth \
               --publish 5001:5001 \
               $BACKEND_IMAGE:dev"

      # llm-service 롤링 업데이트
      - name: Deploy LLM-Service
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} \
            "docker service update \
               --with-registry-auth \
               --image $LLM_IMAGE:dev \
               --update-order stop-first \
               $LLM_SERVICE \
             || \
             docker service create \
               --name $LLM_SERVICE \
               --with-registry-auth \
               --publish 5003:5003 \
               $LLM_IMAGE:dev"

      # ingestion 롤링 업데이트
      - name: Deploy Ingestion
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} \
            "docker service update \
               --with-registry-auth \
               --image $INGEST_IMAGE:dev \
               --update-order stop-first \
               $INGEST_SERVICE \
             || \
             docker service create \
               --name $INGEST_SERVICE \
               --with-registry-auth \
               $INGEST_IMAGE:dev"


      - name: Check Swarm status
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} "\
            docker service ls && echo && \
            docker node ls && echo && \
            docker service ps $BACKEND_SERVICE --no-trunc \
          "
