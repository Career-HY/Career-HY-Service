name: CI/CD - Build & Deploy to Swarm

on:
  push:
    branches: ["dev"]
  workflow_dispatch:

# GITHUB_TOKEN 권한은 최소화 (푸시는 PAT로 처리)
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  ORG: career-hy
  BACKEND_IMAGE: ghcr.io/career-hy/backend
  LLM_IMAGE: ghcr.io/career-hy/llm-service
  INGEST_IMAGE: ghcr.io/career-hy/ingestion
  BACKEND_SERVICE: rag_backend
  LLM_SERVICE: rag_llm-service
  INGEST_SERVICE: rag_ingestion

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/career-hy/backend
          - name: llm-service
            context: ./llm-service
            dockerfile: ./llm-service/Dockerfile
            image: ghcr.io/career-hy/llm-service
          - name: ingestion
            context: ./ingestion
            dockerfile: ./ingestion/Dockerfile
            image: ghcr.io/career-hy/ingestion

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR 로그인 (PAT 사용)
      - name: Login to GHCR (PAT)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build & Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:dev
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Swarm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Write SSH key & known_hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ci_key
          chmod 600 ~/.ssh/ci_key
          ssh-keyscan -H "${{ secrets.EC2_HOST_A }}" >> ~/.ssh/known_hosts

      # (중요) 프라이빗 GHCR이면 원격 서버도 GHCR 로그인 필요
      - name: Remote GHCR login
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} \
            "echo '${GHCR_PAT}' | docker login ghcr.io -u '${GHCR_USERNAME}' --password-stdin || true"

      - name: Deploy Backend
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} \
            "docker service update --image $BACKEND_IMAGE:dev --update-order stop-first $BACKEND_SERVICE \
              || docker service create --name $BACKEND_SERVICE --publish 5001:5001 $BACKEND_IMAGE:dev"

      - name: Deploy LLM-Service
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} \
            "docker service update --image $LLM_IMAGE:dev --update-order stop-first $LLM_SERVICE \
              || docker service create --name $LLM_SERVICE $LLM_IMAGE:dev"

      - name: Deploy Ingestion
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} \
            "docker service update --image $INGEST_IMAGE:dev --update-order stop-first $INGEST_SERVICE \
              || docker service create --name $INGEST_SERVICE $INGEST_IMAGE:dev"

      - name: Check Swarm status
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} "docker service ls && echo && docker node ls && echo && docker service ps $BACKEND_SERVICE --no-trunc"
