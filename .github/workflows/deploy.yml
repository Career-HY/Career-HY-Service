name: Build & Deploy to Docker Swarm

on:
  push:
    branches: [ "dev" ]  # ✅ dev 브랜치 기준으로만 배포 수행

permissions:
  contents: read
  packages: write
  id-token: write  # ✅ GHCR 접근 및 권한 관련 문제 방지

env:
  REGISTRY: ghcr.io
  ORG: ${{ github.repository_owner }}  # ✅ 자동으로 Career-HY (또는 career-hy) 인식
  BACKEND_SERVICE: rag_backend
  LLM_SERVICE: rag_llm-service
  INGEST_SERVICE: rag_ingestion

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/backend
          - name: llm-service
            context: ./llm-service
            dockerfile: ./llm-service/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/llm-service
          - name: ingestion
            context: ./ingestion
            dockerfile: ./ingestion/Dockerfile
            image: ghcr.io/${{ github.repository_owner }}/ingestion

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image }}:dev
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Docker Swarm
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ci_key
          chmod 600 ~/.ssh/ci_key
          ssh-keyscan -H ${{ secrets.EC2_HOST_A }} >> ~/.ssh/known_hosts

      - name: Deploy Backend
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} \
            "docker service update --image ghcr.io/${{ github.repository_owner }}/backend:dev --update-order stop-first $BACKEND_SERVICE || \
             docker service create --name $BACKEND_SERVICE --publish 5001:5001 ghcr.io/${{ github.repository_owner }}/backend:dev"

      - name: Deploy LLM-Service
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} \
            "docker service update --image ghcr.io/${{ github.repository_owner }}/llm-service:dev --update-order stop-first $LLM_SERVICE || \
             docker service create --name $LLM_SERVICE ghcr.io/${{ github.repository_owner }}/llm-service:dev"

      - name: Deploy Ingestion
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} \
            "docker service update --image ghcr.io/${{ github.repository_owner }}/ingestion:dev --update-order stop-first $INGEST_SERVICE || \
             docker service create --name $INGEST_SERVICE ghcr.io/${{ github.repository_owner }}/ingestion:dev"

      - name: Verify Swarm Status
        env:
          HOST: ${{ secrets.EC2_HOST_A }}
          USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/ci_key ${USER}@${HOST} "docker service ls && docker node ls"
