name: Deploy LLM Service

on:
  push:
    branches: [ dev ]
    paths: 
      - 'llm-service/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.LLM_SERVICE_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 기존 디렉토리 백업 후 삭제
          if [ -d "Carrer-Hi-RAG" ]; then
            echo "📦 기존 코드 백업 중..."
            mv Carrer-Hi-RAG Carrer-Hi-RAG.backup.$(date +%Y%m%d_%H%M%S)
          fi
          
          # Fresh Clone
          echo "📥 최신 코드 Clone 중..."
          git clone https://github.com/Career-Hi/Carrer-Hi-RAG.git
          cd Carrer-Hi-RAG
          git checkout dev
          
          # .env 파일 복사
          if [ -f ~/.env ]; then
            cp ~/.env .
            echo "✅ .env 파일을 복사했습니다."
          else
            echo "❌ 홈 디렉토리에 .env 파일이 없습니다."
            exit 1
          fi
          
          # 기존 컨테이너 정리 및 재시작
          echo "🔄 LLM 서비스 재시작 중..."
          docker-compose down || true
          docker-compose up --build --detach llm-service
          
          # 오래된 백업 파일들 정리 (3개 이상 유지하지 않음)
          echo "🧹 오래된 백업 파일 정리 중..."
          ls -t ../Carrer-Hi-RAG.backup.* 2>/dev/null | tail -n +4 | xargs rm -rf || true
          
          echo "🚀 LLM Service 배포가 완료되었습니다."
