name: Deploy LLM Service

on:
  push:
    branches: [ dev ]
    paths: 
      - 'llm-service/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.LLM_SERVICE_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 백업 및 Fresh Clone 방식으로 배포
          echo "🔄 Fresh Clone 방식으로 배포를 시작합니다..."
          
          # 기존 디렉토리 백업
          if [ -d "Carrer-Hi-RAG" ]; then
            echo "📦 기존 코드 백업 중..."
            mv Carrer-Hi-RAG Carrer-Hi-RAG.backup.$(date +%Y%m%d_%H%M%S)
          fi
          
          # Fresh Clone
          echo "📥 최신 코드 Clone 중..."
          git clone https://github.com/Career-Hi/Carrer-Hi-RAG.git
          cd Carrer-Hi-RAG
          git checkout dev
          
          # .env 파일 복사
          if [ -f ~/.env ]; then
            cp ~/.env .
            echo "✅ .env 파일을 복사했습니다."
          else
            echo "❌ 홈 디렉토리에 .env 파일이 없습니다."
            echo "📁 홈 디렉토리 파일 목록:"
            ls -la ~/
            exit 1
          fi
          
          # 기존 LLM Service 컨테이너만 정리 및 재시작
          echo "🔄 LLM 서비스 재시작 중..."
          sudo docker-compose stop llm-service || true
          sudo docker-compose rm -f llm-service || true
          sudo docker-compose up -d --build llm-service
          
          # 성공 시 백업 파일들 정리 (3개 이상 유지하지 않음)
          echo "🧹 오래된 백업 파일 정리 중..."
          ls -t ../Carrer-Hi-RAG.backup.* 2>/dev/null | tail -n +4 | xargs rm -rf || true
          
          # 배포 완료 확인
          echo "🚀 LLM Service 배포가 완료되었습니다."
          echo "📋 실행 중인 컨테이너 확인:"
          sudo docker-compose ps 
