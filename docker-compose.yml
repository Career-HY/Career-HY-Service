services:
  ingestion:
    build: ./ingestion
    env_file:
      - ./.env               
    environment:
      - VECTOR_STORE_PATH=/app/data/vector_store_pymupdf_text-embedding-ada-002_chroma
    volumes:
      - ./ingestion/dataset:/app/dataset
      - ./ingestion/data:/app/data
    ports:
      - "5002:5002"

  backend:
    build: ./backend
    env_file:
      - ./.env
    ports:
      - "5001:5001"
    volumes:
      - ./backend/src:/app/src

  llm-service:
    build: ./llm-service
    env_file:
      - ./.env
    ports:
      - "5003:5003"
    volumes:
      - ./llm-service/src:/app/src
      - ./llm-service/logs:/app/logs

