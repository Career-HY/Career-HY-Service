services:
  backend:
    build: ./backend
    env_file:
      - ./.env
    ports:
      - "5001:5001"
    volumes:
      - ./backend/src:/app/src
    # 개발 시에만 덮어쓸 값
    # environment:
    #   LLM_SERVICE_URL: http://llm-service:5003

  ingestion:
    build: ./ingestion
    env_file:
      - ./.env               
    environment:
      - VECTOR_STORE_PATH=/app/data/vector_store_pymupdf_text-embedding-ada-002_chroma
    volumes:
      - ./ingestion/data:/app/data
    ports:
      - "5002:5002"

  llm-service:
    build: ./llm-service
    env_file:
      - ./.env
    ports:
      - "5003:5003"
    volumes:
      - ./llm-service/src:/app/src
      - ./llm-service/logs:/app/logs
    environment:
      - VECTOR_STORE_PATH=/app/data/vector_store_pymupdf_text-embedding-ada-002_chroma
      - INGESTION_SERVICE_URL=http://ingestion:5002
    depends_on:
      - ingestion

  crawler:
    build: ./crawler
    env_file:
      - ./.env
    environment:
      - INGESTION_SERVICE_URL=http://ingestion:5002
    depends_on:
      - ingestion
    command: python scheduler.py
    restart: unless-stopped
    # 수동 실행 방법:
    # docker-compose run --rm crawler python main.py  # 1회만 실행
    # docker-compose run --rm crawler python test_s3_upload.py  # S3 업로드 테스트
